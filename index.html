    <script>
        (function() {
            try {
                var theme = localStorage.getItem('theme');
                var isDark = theme ? theme === 'dark' : true;
                if (isDark) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
                document.documentElement.style.backgroundColor = isDark ? '#0d0d12' : '#f1f5f9';
                document.documentElement.style.color = isDark ? 'white' : '#0f172a';
                var metaThemeColor = document.querySelector('meta[name="theme-color"]');
                if (metaThemeColor) {
                    metaThemeColor.setAttribute('content', isDark ? '#0d0d12' : '#f1f5f9');
                }
            } catch (e) {}
        })();
    </script>
